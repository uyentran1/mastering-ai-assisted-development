<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUTRUN // Neon Highway</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0014;
    font-family: 'Courier New', monospace;
  }

  canvas { display: block; }

  #hud {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
    color: #fff;
  }

  .hud-block {
    text-shadow: 0 0 8px #ff2bd6, 0 0 16px #ff2bd6;
  }

  .hud-label {
    font-size: 12px;
    letter-spacing: 4px;
    color: #7df9ff;
    text-shadow: 0 0 8px #00eaff, 0 0 16px #00eaff;
  }

  .hud-value {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  #speedWrap {
    text-align: right;
  }

  #title-screen, #gameover-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, rgba(40,0,60,0.55) 0%, rgba(5,0,15,0.92) 75%);
    text-align: center;
  }

  #gameover-screen { display: none; }

  .neon-title {
    font-size: 72px;
    font-weight: bold;
    letter-spacing: 10px;
    color: #fff;
    text-shadow:
      0 0 10px #ff2bd6,
      0 0 20px #ff2bd6,
      0 0 40px #ff2bd6,
      0 0 80px #7d2bff;
    animation: flicker 3s infinite alternate;
  }

  .sub-title {
    margin-top: 14px;
    font-size: 18px;
    letter-spacing: 6px;
    color: #7df9ff;
    text-shadow: 0 0 8px #00eaff, 0 0 20px #00eaff;
  }

  .prompt {
    margin-top: 60px;
    font-size: 16px;
    letter-spacing: 3px;
    color: #fff;
    padding: 14px 34px;
    border: 2px solid #ff2bd6;
    box-shadow: 0 0 12px #ff2bd6, inset 0 0 12px #ff2bd6;
    animation: pulse 1.6s infinite;
    background: rgba(255,43,214,0.08);
  }

  .instructions {
    margin-top: 30px;
    color: #b98cff;
    font-size: 13px;
    letter-spacing: 2px;
    line-height: 1.8;
  }

  .final-score {
    margin-top: 10px;
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 8px #00eaff, 0 0 16px #00eaff;
    letter-spacing: 4px;
  }

  .high-scores {
    margin-top: 24px;
    color: #ff2bd6;
    text-shadow: 0 0 8px #ff2bd6;
    font-size: 15px;
    letter-spacing: 2px;
    line-height: 2;
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 55% { opacity: 0.75; }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px #ff2bd6, inset 0 0 12px #ff2bd6; }
    50% { box-shadow: 0 0 26px #ff2bd6, inset 0 0 20px #ff2bd6; }
  }

  #crash-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #ff2bd6;
    opacity: 0;
    pointer-events: none;
    z-index: 15;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">DISTANCE</div>
    <div class="hud-value" id="scoreValue">0000</div>
  </div>
  <div class="hud-block" id="speedWrap">
    <div class="hud-label">SPEED</div>
    <div class="hud-value" id="speedValue">000</div>
  </div>
</div>

<div id="crash-flash"></div>

<div id="title-screen">
  <div class="neon-title">OUTRUN</div>
  <div class="sub-title">N E O N &nbsp; H I G H W A Y</div>
  <div class="prompt">PRESS SPACE TO START</div>
  <div class="instructions">
    ARROW KEYS / A D &nbsp; — &nbsp; STEER<br>
    SURVIVE THE NEON GRID &nbsp; — &nbsp; DODGE THE HAZARDS
  </div>
</div>

<div id="gameover-screen">
  <div class="neon-title" style="font-size:56px;">GAME OVER</div>
  <div class="final-score" id="finalScore">DISTANCE: 0000</div>
  <div class="high-scores" id="highScoreList"></div>
  <div class="prompt" style="margin-top:40px;">PRESS SPACE TO RESTART</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------
  // Constants
  // ---------------------------------------------------------------------
  const ROAD_WIDTH = 16;
  const LANE_HALF_WIDTH = ROAD_WIDTH / 2 - 1.2;
  const SEGMENT_LENGTH = 8;
  const SEGMENT_COUNT = 60;
  const TOTAL_ROAD_LENGTH = SEGMENT_LENGTH * SEGMENT_COUNT;

  const COLORS = {
    pink: 0xff2bd6,
    cyan: 0x00eaff,
    purple: 0x7d2bff,
    deepPurple: 0x2a0050,
    sunYellow: 0xffd54a,
    sunOrange: 0xff5f6d
  };

  // ---------------------------------------------------------------------
  // Renderer / Scene / Camera
  // ---------------------------------------------------------------------
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a0033, 0.014);

  const camera = new THREE.PerspectiveCamera(
    75, window.innerWidth / window.innerHeight, 0.1, 1000
  );
  camera.position.set(0, 4.2, 8);
  camera.lookAt(0, 1.5, -20);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------------------------------------------------------------------
  // Synthwave sky (gradient sphere + sun)
  // ---------------------------------------------------------------------
  function createSky() {
    const skyGeo = new THREE.SphereGeometry(400, 32, 32);
    const canvas = document.createElement('canvas');
    canvas.width = 2;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0.0, '#1a0033');
    grad.addColorStop(0.35, '#3b0a5c');
    grad.addColorStop(0.55, '#7d2b8b');
    grad.addColorStop(0.72, '#ff5f6d');
    grad.addColorStop(0.85, '#ff9d5c');
    grad.addColorStop(1.0, '#ffd54a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 2, 256);
    const tex = new THREE.CanvasTexture(canvas);
    const skyMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // Sun
    const sunGeo = new THREE.CircleGeometry(38, 48);
    const sunCanvas = document.createElement('canvas');
    sunCanvas.width = 256;
    sunCanvas.height = 256;
    const sctx = sunCanvas.getContext('2d');
    const sunGrad = sctx.createLinearGradient(0, 0, 0, 256);
    sunGrad.addColorStop(0, '#fff6a8');
    sunGrad.addColorStop(0.45, '#ffd54a');
    sunGrad.addColorStop(0.75, '#ff5f6d');
    sunGrad.addColorStop(1, '#ff2bd6');
    sctx.fillStyle = sunGrad;
    sctx.fillRect(0, 0, 256, 256);
    // scanlines cut into the sun
    sctx.fillStyle = 'rgba(26,0,51,1)';
    for (let y = 140; y < 256; y += 14) {
      sctx.fillRect(0, y, 256, 6);
    }
    const sunTex = new THREE.CanvasTexture(sunCanvas);
    const sunMat = new THREE.MeshBasicMaterial({ map: sunTex, transparent: true, fog: false });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(0, 24, -260);
    scene.add(sun);

    // Sun glow
    const glowGeo = new THREE.CircleGeometry(58, 48);
    const glowMat = new THREE.MeshBasicMaterial({
      color: COLORS.sunOrange, transparent: true, opacity: 0.25, fog: false
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(0, 24, -261);
    scene.add(glow);

    return sun;
  }
  createSky();

  // Distant mountain silhouette (simple layered triangles)
  function createMountains() {
    const group = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({ color: 0x1a0044, fog: false, transparent: true, opacity: 0.85 });
    for (let i = 0; i < 14; i++) {
      const w = 40 + Math.random() * 60;
      const h = 20 + Math.random() * 50;
      const geo = new THREE.ConeGeometry(w / 2, h, 3);
      const m = new THREE.Mesh(geo, mat);
      m.position.set(-350 + i * 55 + (Math.random() * 20 - 10), h / 2 - 4, -270 - Math.random() * 40);
      m.rotation.y = Math.random() * Math.PI;
      group.add(m);
    }
    scene.add(group);
  }
  createMountains();

  // Ambient light (mostly unlit/emissive neon look, but a touch of light helps)
  scene.add(new THREE.AmbientLight(0x8855ff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xff9dfa, 0.4);
  dirLight.position.set(0, 30, 10);
  scene.add(dirLight);

  // ---------------------------------------------------------------------
  // Neon grid road
  // ---------------------------------------------------------------------
  const roadGroup = new THREE.Group();
  scene.add(roadGroup);

  // Road surface (dark, semi-reflective feel via low emissive)
  const roadMat = new THREE.MeshBasicMaterial({ color: 0x0d0221 });
  const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, TOTAL_ROAD_LENGTH);
  const roadMesh = new THREE.Mesh(roadGeo, roadMat);
  roadMesh.rotation.x = -Math.PI / 2;
  roadMesh.position.set(0, 0, -TOTAL_ROAD_LENGTH / 2 + 20);
  roadGroup.add(roadMesh);

  // Ground plane extending beyond the road, with grid
  const groundGeo = new THREE.PlaneGeometry(600, TOTAL_ROAD_LENGTH);
  const groundMat = new THREE.MeshBasicMaterial({ color: 0x0a0018 });
  const groundMesh = new THREE.Mesh(groundGeo, groundMat);
  groundMesh.rotation.x = -Math.PI / 2;
  groundMesh.position.set(0, -0.02, -TOTAL_ROAD_LENGTH / 2 + 20);
  scene.add(groundMesh);

  // Grid lines: pink horizontal (rungs) + cyan vertical (lane edges/side rails)
  function buildGridLines() {
    const group = new THREE.Group();

    // Horizontal rungs (across the ground, receding)
    const rungMat = new THREE.LineBasicMaterial({ color: COLORS.pink, transparent: true, opacity: 0.85 });
    const rungPositions = [];
    for (let i = 0; i <= SEGMENT_COUNT; i++) {
      const z = -i * SEGMENT_LENGTH + 20;
      rungPositions.push(-140, 0.01, z, 140, 0.01, z);
    }
    const rungGeo = new THREE.BufferGeometry();
    rungGeo.setAttribute('position', new THREE.Float32BufferAttribute(rungPositions, 3));
    group.add(new THREE.LineSegments(rungGeo, rungMat));

    // Vertical lines (cyan) running the length of the road/ground, multiple lanes
    const vertMat = new THREE.LineBasicMaterial({ color: COLORS.cyan, transparent: true, opacity: 0.9 });
    const vertPositions = [];
    const xLines = [-140, -100, -60, -ROAD_WIDTH/2, -ROAD_WIDTH/6, ROAD_WIDTH/6, ROAD_WIDTH/2, 60, 100, 140];
    xLines.forEach((x) => {
      vertPositions.push(x, 0.01, 20, x, 0.01, -TOTAL_ROAD_LENGTH + 20);
    });
    const vertGeo = new THREE.BufferGeometry();
    vertGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertPositions, 3));
    group.add(new THREE.LineSegments(vertGeo, vertMat));

    // Road edge glow strips
    const edgeGeo = new THREE.BoxGeometry(0.25, 0.15, TOTAL_ROAD_LENGTH);
    const edgeMatPink = new THREE.MeshBasicMaterial({ color: COLORS.pink });
    const leftEdge = new THREE.Mesh(edgeGeo, edgeMatPink);
    leftEdge.position.set(-ROAD_WIDTH / 2, 0.08, -TOTAL_ROAD_LENGTH / 2 + 20);
    const rightEdge = new THREE.Mesh(edgeGeo, edgeMatPink.clone());
    rightEdge.position.set(ROAD_WIDTH / 2, 0.08, -TOTAL_ROAD_LENGTH / 2 + 20);
    group.add(leftEdge, rightEdge);

    // Center dashed line (cyan)
    const dashMat = new THREE.MeshBasicMaterial({ color: COLORS.cyan });
    for (let i = 0; i < SEGMENT_COUNT * 2; i++) {
      const dash = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 2), dashMat);
      dash.position.set(0, 0.05, 20 - i * 4);
      group.add(dash);
    }

    return group;
  }
  const gridLines = buildGridLines();
  roadGroup.add(gridLines);

  // Neon pylons lining the road (glowing poles receding into distance)
  function buildPylons() {
    const group = new THREE.Group();
    const pinkMat = new THREE.MeshBasicMaterial({ color: COLORS.pink });
    const cyanMat = new THREE.MeshBasicMaterial({ color: COLORS.cyan });
    for (let i = 0; i < SEGMENT_COUNT / 2; i++) {
      const z = 10 - i * 16;
      const mat = i % 2 === 0 ? pinkMat : cyanMat;
      const geo = new THREE.BoxGeometry(0.3, 3.5 + (i % 3), 0.3);
      const left = new THREE.Mesh(geo, mat);
      left.position.set(-ROAD_WIDTH / 2 - 1.5, geo.parameters.height / 2, z);
      const right = new THREE.Mesh(geo, mat);
      right.position.set(ROAD_WIDTH / 2 + 1.5, geo.parameters.height / 2, z);
      group.add(left, right);
    }
    return group;
  }
  const pylons = buildPylons();
  roadGroup.add(pylons);

  // ---------------------------------------------------------------------
  // Player car
  // ---------------------------------------------------------------------
  function createCar() {
    const car = new THREE.Group();

    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1a1a2e, shininess: 90, emissive: 0x0c0c1a });
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.6), bodyMat);
    body.position.y = 0.55;
    car.add(body);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.6), bodyMat);
    cabin.position.set(0, 1.0, -0.2);
    car.add(cabin);

    // Neon underglow / trim
    const trimMat = new THREE.MeshBasicMaterial({ color: COLORS.cyan });
    const trim = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.08, 3.7), trimMat);
    trim.position.y = 0.3;
    car.add(trim);

    // Taillights
    const tailMat = new THREE.MeshBasicMaterial({ color: COLORS.pink });
    const tailL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.1), tailMat);
    tailL.position.set(-0.65, 0.55, 1.82);
    const tailR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.1), tailMat.clone());
    tailR.position.set(0.65, 0.55, 1.82);
    car.add(tailL, tailR);

    // Headlights
    const headMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const headL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), headMat);
    headL.position.set(-0.6, 0.55, -1.82);
    const headR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), headMat.clone());
    headR.position.set(0.6, 0.55, -1.82);
    car.add(headL, headR);

    // Wheels
    const wheelMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 12);
    const wheelPositions = [
      [-0.95, 0.4, -1.1], [0.95, 0.4, -1.1],
      [-0.95, 0.4, 1.1], [0.95, 0.4, 1.1]
    ];
    wheelPositions.forEach((p) => {
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(p[0], p[1], p[2]);
      car.add(w);
    });

    // Underglow light disc
    const glowGeo = new THREE.CircleGeometry(1.6, 24);
    const glowMat = new THREE.MeshBasicMaterial({ color: COLORS.purple, transparent: true, opacity: 0.5 });
    const glowDisc = new THREE.Mesh(glowGeo, glowMat);
    glowDisc.rotation.x = -Math.PI / 2;
    glowDisc.position.y = 0.03;
    car.add(glowDisc);

    return car;
  }
  const car = createCar();
  car.position.set(0, 0, 4);
  scene.add(car);

  // ---------------------------------------------------------------------
  // Obstacles
  // ---------------------------------------------------------------------
  const obstacles = [];
  const obstaclePool = [];

  function makeObstacleMesh() {
    const type = Math.random();
    const group = new THREE.Group();
    let color = Math.random() < 0.5 ? COLORS.pink : COLORS.cyan;
    if (Math.random() < 0.2) color = COLORS.purple;

    let size;
    if (type < 0.6) {
      // Cube / crate
      size = new THREE.Vector3(1.6, 1.6, 1.6);
      const geo = new THREE.BoxGeometry(size.x, size.y, size.z);
      const mat = new THREE.MeshBasicMaterial({ color, wireframe: false, transparent: true, opacity: 0.85 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = size.y / 2;
      group.add(mesh);
      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0xffffff })
      );
      wire.position.y = size.y / 2;
      group.add(wire);
    } else {
      // Neon wall panel (spans part of lane width)
      size = new THREE.Vector3(2.6, 2.2, 0.6);
      const geo = new THREE.BoxGeometry(size.x, size.y, size.z);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = size.y / 2;
      group.add(mesh);
      const wire = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0xffffff })
      );
      wire.position.y = size.y / 2;
      group.add(wire);
    }

    group.userData.halfSize = size.clone().multiplyScalar(0.5);
    group.userData.baseColor = color;
    return group;
  }

  function spawnObstacle(z, patrol) {
    let group = obstaclePool.pop();
    if (!group) {
      group = makeObstacleMesh();
      scene.add(group);
    } else {
      group.visible = true;
    }
    const x = (Math.random() * 2 - 1) * LANE_HALF_WIDTH;
    group.position.set(x, 0, z);
    group.userData.patrol = patrol && Math.random() < 0.35;
    group.userData.patrolSpeed = (Math.random() * 0.5 + 0.3) * (Math.random() < 0.5 ? 1 : -1);
    group.userData.patrolCenter = x;
    group.userData.hit = false;
    obstacles.push(group);
  }

  function recycleObstacle(group) {
    group.visible = false;
    const idx = obstacles.indexOf(group);
    if (idx !== -1) obstacles.splice(idx, 1);
    obstaclePool.push(group);
  }

  // ---------------------------------------------------------------------
  // Particle explosion system
  // ---------------------------------------------------------------------
  const MAX_PARTICLES = 300;
  const particleGeo = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(MAX_PARTICLES * 3);
  const particleColors = new Float32Array(MAX_PARTICLES * 3);
  particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
  const particleMat = new THREE.PointsMaterial({
    size: 0.35,
    vertexColors: true,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const particleSystem = new THREE.Points(particleGeo, particleMat);
  particleSystem.frustumCulled = false;
  scene.add(particleSystem);

  let particles = []; // { pos: Vector3, vel: Vector3, life, maxLife }

  function explode(position, color) {
    const c = new THREE.Color(color);
    for (let i = 0; i < 80; i++) {
      const dir = new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 1.4,
        Math.random() * 2 - 1
      ).normalize();
      const speed = Math.random() * 9 + 3;
      particles.push({
        pos: position.clone(),
        vel: dir.multiplyScalar(speed),
        life: 0,
        maxLife: Math.random() * 0.8 + 0.6,
        color: c
      });
    }
    if (particles.length > MAX_PARTICLES) {
      particles = particles.slice(particles.length - MAX_PARTICLES);
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt;
      if (p.life >= p.maxLife) {
        particles.splice(i, 1);
        continue;
      }
      p.vel.y -= 9.8 * dt; // gravity
      p.pos.addScaledVector(p.vel, dt);
    }
    const posAttr = particleGeo.attributes.position;
    const colAttr = particleGeo.attributes.color;
    for (let i = 0; i < MAX_PARTICLES; i++) {
      if (i < particles.length) {
        const p = particles[i];
        posAttr.setXYZ(i, p.pos.x, p.pos.y, p.pos.z);
        const fade = 1 - p.life / p.maxLife;
        colAttr.setXYZ(i, p.color.r * fade, p.color.g * fade, p.color.b * fade);
      } else {
        posAttr.setXYZ(i, 0, -1000, 0);
        colAttr.setXYZ(i, 0, 0, 0);
      }
    }
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
  }

  // ---------------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------------
  const STATE = { TITLE: 'title', PLAYING: 'playing', CRASHED: 'crashed', GAMEOVER: 'gameover' };
  let gameState = STATE.TITLE;

  let score = 0;
  let speed = 0;
  const BASE_SPEED = 18;
  const MAX_SPEED = 95;
  const ACCEL_RATE = 0.55; // units per second^2 added over time

  let carX = 0;
  let carVelX = 0;
  const STEER_ACCEL = 26;
  const STEER_FRICTION = 6;
  const MAX_CAR_VEL = 14;

  let elapsedTime = 0;
  let nextSpawnZ = -60;
  let spawnGap = 34;

  let crashTimer = 0;
  let crashShakeMag = 0;

  const keys = {};
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') {
      if (gameState === STATE.TITLE) startGame();
      else if (gameState === STATE.GAMEOVER) startGame();
      e.preventDefault();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  const scoreEl = document.getElementById('scoreValue');
  const speedEl = document.getElementById('speedValue');
  const titleScreen = document.getElementById('title-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const finalScoreEl = document.getElementById('finalScore');
  const highScoreListEl = document.getElementById('highScoreList');
  const crashFlashEl = document.getElementById('crash-flash');

  function loadHighScores() {
    try {
      const raw = localStorage.getItem('retrowave_highscores');
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveHighScores(scores) {
    try {
      localStorage.setItem('retrowave_highscores', JSON.stringify(scores));
    } catch (e) { /* ignore */ }
  }

  function updateHighScores(newScore) {
    const scores = loadHighScores();
    scores.push(Math.floor(newScore));
    scores.sort((a, b) => b - a);
    const top3 = scores.slice(0, 3);
    saveHighScores(top3);
    return top3;
  }

  function renderHighScores(top3) {
    if (top3.length === 0) {
      highScoreListEl.innerHTML = '';
      return;
    }
    const medals = ['1ST', '2ND', '3RD'];
    highScoreListEl.innerHTML = top3
      .map((s, i) => `${medals[i]} &nbsp; ${String(s).padStart(4, '0')}`)
      .join('<br>');
  }

  function resetGame() {
    score = 0;
    speed = BASE_SPEED;
    carX = 0;
    carVelX = 0;
    elapsedTime = 0;
    nextSpawnZ = -60;
    spawnGap = 34;
    crashTimer = 0;
    particles = [];

    // Clear obstacles
    while (obstacles.length) recycleObstacle(obstacles[0]);

    car.position.set(0, 0, 4);
    car.rotation.set(0, 0, 0);
    car.visible = true;
  }

  function startGame() {
    resetGame();
    gameState = STATE.PLAYING;
    titleScreen.style.display = 'none';
    gameoverScreen.style.display = 'none';
  }

  function triggerGameOver() {
    gameState = STATE.GAMEOVER;
    finalScoreEl.textContent = 'DISTANCE: ' + String(Math.floor(score)).padStart(4, '0');
    const top3 = updateHighScores(score);
    renderHighScores(top3);
    gameoverScreen.style.display = 'flex';
  }

  // ---------------------------------------------------------------------
  // Collision detection
  // ---------------------------------------------------------------------
  const CAR_HALF = { x: 0.95, z: 1.85 };

  function checkCollisions() {
    for (let i = 0; i < obstacles.length; i++) {
      const o = obstacles[i];
      if (o.userData.hit) continue;
      const dz = Math.abs(o.position.z - car.position.z);
      const dx = Math.abs(o.position.x - car.position.x);
      const hs = o.userData.halfSize;
      if (dz < (hs.z + CAR_HALF.z) && dx < (hs.x + CAR_HALF.x)) {
        o.userData.hit = true;
        return o;
      }
    }
    return null;
  }

  // ---------------------------------------------------------------------
  // Main update loop
  // ---------------------------------------------------------------------
  const clock = new THREE.Clock();

  function update(dt) {
    updateParticles(dt);

    if (gameState === STATE.PLAYING) {
      elapsedTime += dt;

      // Speed ramps up over time
      speed = Math.min(MAX_SPEED, BASE_SPEED + elapsedTime * ACCEL_RATE);

      // Steering input
      let steerInput = 0;
      if (keys['ArrowLeft'] || keys['KeyA']) steerInput -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) steerInput += 1;

      if (steerInput !== 0) {
        carVelX += steerInput * STEER_ACCEL * dt;
      } else {
        // friction toward zero
        const sign = Math.sign(carVelX);
        carVelX -= sign * Math.min(Math.abs(carVelX), STEER_FRICTION * dt * 4);
      }
      carVelX = THREE.MathUtils.clamp(carVelX, -MAX_CAR_VEL, MAX_CAR_VEL);
      carX += carVelX * dt;

      const limit = LANE_HALF_WIDTH + 1.5;
      if (carX > limit) { carX = limit; carVelX = 0; }
      if (carX < -limit) { carX = -limit; carVelX = 0; }

      car.position.x = carX;
      car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, -carVelX * 0.02, 0.2);
      car.rotation.y = THREE.MathUtils.lerp(car.rotation.y, -carVelX * 0.015, 0.2);

      // Score by distance
      score += speed * dt * 0.6;
      scoreEl.textContent = String(Math.floor(score)).padStart(4, '0');
      speedEl.textContent = String(Math.floor(speed * 3.2)).padStart(3, '0');

      // Move world toward camera (scroll road/obstacles/pylons)
      const dz = speed * dt;
      obstacles.forEach((o) => {
        o.position.z += dz;
        if (o.userData.patrol) {
          const t = elapsedTime * o.userData.patrolSpeed;
          o.position.x = THREE.MathUtils.clamp(
            o.userData.patrolCenter + Math.sin(t) * 3.2,
            -LANE_HALF_WIDTH, LANE_HALF_WIDTH
          );
        }
      });
      // Recycle obstacles behind camera
      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (obstacles[i].position.z > 12) recycleObstacle(obstacles[i]);
      }

      // Scroll grid + pylons, wrapping to create infinite road illusion
      gridLines.position.z += dz;
      if (gridLines.position.z > SEGMENT_LENGTH) {
        gridLines.position.z -= SEGMENT_LENGTH;
      }
      pylons.position.z += dz;
      if (pylons.position.z > 16) {
        pylons.position.z -= 16;
      }
      roadMesh.position.z += 0; // road plane stays huge/static, no need to scroll
      groundMesh.position.z += 0;

      // Spawn new obstacles ahead based on world-space distance traveled
      nextSpawnZ += dz;
      const difficultyFactor = Math.min(1, elapsedTime / 45);
      const currentGap = THREE.MathUtils.lerp(34, 16, difficultyFactor);
      if (nextSpawnZ > -20) {
        spawnObstacle(-140 - Math.random() * 20, true);
        nextSpawnZ = -currentGap - Math.random() * 14;
      }

      // Camera follow with slight lean into turns
      camera.position.x = THREE.MathUtils.lerp(camera.position.x, carX * 0.4, 0.08);
      camera.lookAt(carX * 0.6, 1.5, car.position.z - 20);

      // Collision check
      const hit = checkCollisions();
      if (hit) {
        gameState = STATE.CRASHED;
        crashTimer = 0;
        explode(new THREE.Vector3(car.position.x, 1.0, car.position.z), 0xffffff);
        explode(hit.position.clone().setY(1.0), hit.userData.baseColor);
        car.visible = false;
        crashFlashEl.style.transition = 'none';
        crashFlashEl.style.opacity = '0.85';
      }
    } else if (gameState === STATE.CRASHED) {
      crashTimer += dt;
      // fade out flash
      const flashOpacity = Math.max(0, 0.85 - crashTimer * 2.2);
      crashFlashEl.style.opacity = String(flashOpacity);

      // camera shake
      crashShakeMag = Math.max(0, 0.4 - crashTimer * 0.6);
      camera.position.x += (Math.random() * 2 - 1) * crashShakeMag;
      camera.position.y += (Math.random() * 2 - 1) * crashShakeMag * 0.5;

      if (crashTimer > 1.1) {
        triggerGameOver();
      }
    }

    renderer.render(scene, camera);
  }

  function loop() {
    const dt = Math.min(clock.getDelta(), 0.05);
    update(dt);
    requestAnimationFrame(loop);
  }

  // Prime a few obstacles for visual richness on title screen (idle scene)
  for (let i = 0; i < 3; i++) {
    spawnObstacle(-60 - i * 40, false);
  }

  loop();
})();
</script>
