# Video 6.1: Code Review with AI
#
# This GitHub Action runs an AI code review on every pull request.
# It posts review comments directly on the PR with findings.
#
# Guardrails:
# - AI suggests only, never auto-merges
# - Cost controls via max token limits
# - Fails gracefully (review failure doesn't block the PR)
# - Secrets stay in GitHub Secrets, never exposed to the AI

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    # Don't block PRs if the review fails
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "lines=$(wc -l < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Review (placeholder)
        if: steps.diff.outputs.lines > 0
        run: |
          echo "In production, this step would:"
          echo "  1. Send the diff to Claude API for review"
          echo "  2. Parse the response for security findings, bugs, suggestions"
          echo "  3. Post comments on specific PR lines"
          echo ""
          echo "Key guardrails:"
          echo "  - ANTHROPIC_API_KEY stored in GitHub Secrets"
          echo "  - Max tokens capped to control costs"
          echo "  - AI suggestions only, human approval required"
          echo "  - Review failure does NOT block the PR (continue-on-error: true)"

      # Example: Post a summary comment on the PR
