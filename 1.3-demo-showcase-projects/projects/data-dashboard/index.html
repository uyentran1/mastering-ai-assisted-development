<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ============== HEADER ============== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(233, 69, 96, 0.2);
    }

    .header h1 {
      font-size: 28px;
      color: #ffffff;
      font-weight: 600;
    }

    .date-range {
      color: #b0b0b0;
      font-size: 14px;
    }

    /* ============== STAT CARDS ============== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(233, 69, 96, 0.15) 0%, rgba(233, 69, 96, 0.05) 100%);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      padding: 25px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #e94560 0%, #ff6b9d 100%);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(233, 69, 96, 0.6);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
    }

    .stat-label {
      font-size: 14px;
      color: #b0b0b0;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 10px;
    }

    .stat-change {
      font-size: 12px;
      color: #7ec97e;
    }

    .stat-change.negative {
      color: #ff6b6b;
    }

    /* ============== CHARTS CONTAINER ============== */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .chart-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(233, 69, 96, 0.2);
      border-radius: 12px;
      padding: 25px;
      transition: all 0.3s ease;
    }

    .chart-container:hover {
      border-color: rgba(233, 69, 96, 0.5);
      box-shadow: 0 8px 20px rgba(233, 69, 96, 0.15);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-legend {
      font-size: 12px;
      color: #808080;
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
    }

    /* ============== RESPONSIVE ============== */
    @media (max-width: 1024px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .stat-card {
        padding: 20px;
      }

      .stat-value {
        font-size: 28px;
      }

      .header h1 {
        font-size: 22px;
      }
    }

    /* ============== ANIMATIONS ============== */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-card {
      animation: slideIn 0.6s ease forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }

    .chart-container {
      animation: slideIn 0.6s ease forwards;
      animation-delay: 0.5s;
    }

    /* ============== COUNTER ANIMATION ============== */
    .counter {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📊 Analytics Dashboard</h1>
      <div class="date-range" id="dateRange">March 2024</div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Visitors</div>
        <div class="stat-value counter" id="visitorsCount">0</div>
        <div class="stat-change">+12.5% from last month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Page Views</div>
        <div class="stat-value counter" id="pageViewsCount">0</div>
        <div class="stat-change">+8.2% from last month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bounce Rate</div>
        <div class="stat-value counter" id="bounceRateCount">0</div>
        <div class="stat-change negative">-2.3% from last month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Session</div>
        <div class="stat-value counter" id="avgSessionCount">0</div>
        <div class="stat-change">+4.1% from last month</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <!-- Visitors Over Time -->
      <div class="chart-container">
        <div class="chart-title">
          Visitors Over Last 30 Days
          <span class="chart-legend">Daily</span>
        </div>
        <div class="chart-wrapper">
          <canvas id="visitorsChart"></canvas>
        </div>
      </div>

      <!-- Top Pages -->
      <div class="chart-container">
        <div class="chart-title">
          Top 5 Pages by Views
          <span class="chart-legend">Monthly</span>
        </div>
        <div class="chart-wrapper">
          <canvas id="topPagesChart"></canvas>
        </div>
      </div>

      <!-- Traffic Sources -->
      <div class="chart-container">
        <div class="chart-title">
          Traffic Sources Distribution
          <span class="chart-legend">Overall</span>
        </div>
        <div class="chart-wrapper">
          <canvas id="trafficSourcesChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============== COUNTER ANIMATION ==============
    function animateCounter(element, target, duration = 2000) {
      let current = 0;
      const increment = target / (duration / 16);
      const interval = setInterval(() => {
        current += increment;
        if (current >= target) {
          current = target;
          clearInterval(interval);
        }
        element.textContent = Math.floor(current).toLocaleString();
      }, 16);
    }

    // Animate counters
    animateCounter(document.getElementById('visitorsCount'), 24560);
    animateCounter(document.getElementById('pageViewsCount'), 87420);
    animateCounter(document.getElementById('bounceRateCount'), 32.5);
    animateCounter(document.getElementById('avgSessionCount'), 5.2);

    // Update date range
    const today = new Date();
    const monthName = today.toLocaleString('default', { month: 'long', year: 'numeric' });
    document.getElementById('dateRange').textContent = monthName;

    // ============== CHART CONFIGURATION ==============
    const chartConfig = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: '#e0e0e0',
            font: { size: 12 }
          }
        },
        tooltip: {
          backgroundColor: 'rgba(0, 0, 0, 0.8)',
          titleColor: '#e94560',
          bodyColor: '#e0e0e0',
          borderColor: '#e94560',
          borderWidth: 1,
          padding: 12
        }
      }
    };

    // ============== VISITORS OVER TIME CHART ==============
    const visitorsCtx = document.getElementById('visitorsChart').getContext('2d');
    const visitorsData = [];
    for (let i = 0; i < 30; i++) {
      visitorsData.push(Math.floor(Math.random() * 3000) + 1500);
    }

    new Chart(visitorsCtx, {
      type: 'line',
      data: {
        labels: Array.from({ length: 30 }, (_, i) => `Day ${i + 1}`),
        datasets: [{
          label: 'Visitors',
          data: visitorsData,
          borderColor: '#e94560',
          backgroundColor: 'rgba(233, 69, 96, 0.1)',
          borderWidth: 3,
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#e94560',
          pointBorderColor: '#1a1a2e',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        ...chartConfig,
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(233, 69, 96, 0.1)' },
            ticks: { color: '#808080' }
          },
          x: {
            grid: { color: 'rgba(233, 69, 96, 0.05)' },
            ticks: { color: '#808080' }
          }
        }
      }
    });

    // ============== TOP PAGES CHART ==============
    const topPagesCtx = document.getElementById('topPagesChart').getContext('2d');
    new Chart(topPagesCtx, {
      type: 'bar',
      data: {
        labels: ['Homepage', 'Pricing', 'Features', 'Blog', 'Contact'],
        datasets: [{
          label: 'Page Views',
          data: [15420, 12350, 9870, 8540, 6320],
          backgroundColor: [
            'rgba(233, 69, 96, 0.8)',
            'rgba(233, 69, 96, 0.6)',
            'rgba(233, 69, 96, 0.5)',
            'rgba(233, 69, 96, 0.4)',
            'rgba(233, 69, 96, 0.3)'
          ],
          borderColor: '#e94560',
          borderWidth: 2
        }]
      },
      options: {
        indexAxis: 'y',
        ...chartConfig,
        scales: {
          x: {
            beginAtZero: true,
            grid: { color: 'rgba(233, 69, 96, 0.1)' },
            ticks: { color: '#808080' }
          },
          y: {
            grid: { color: 'transparent' },
            ticks: { color: '#808080' }
          }
        }
      }
    });

    // ============== TRAFFIC SOURCES CHART ==============
    const trafficCtx = document.getElementById('trafficSourcesChart').getContext('2d');
    new Chart(trafficCtx, {
      type: 'doughnut',
      data: {
        labels: ['Direct', 'Organic', 'Social', 'Referral', 'Email'],
        datasets: [{
          data: [35, 28, 18, 12, 7],
          backgroundColor: [
            '#e94560',
            '#ff6b9d',
            '#ffa6c1',
            '#ff9db5',
            '#ff8fa3'
          ],
          borderColor: '#1a1a2e',
          borderWidth: 3
        }]
      },
      options: {
        ...chartConfig,
        plugins: {
          ...chartConfig.plugins,
          legend: {
            position: 'bottom',
            labels: {
              color: '#e0e0e0',
              padding: 20,
              font: { size: 12 }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
