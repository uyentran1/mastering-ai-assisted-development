<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retrowave Racing Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ffff;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px #00ffff;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }

    .hud-item {
      margin-bottom: 10px;
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff;
    }

    #gameOverScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
    }

    .game-over-content {
      text-align: center;
      color: #ff00ff;
      text-shadow: 0 0 20px #ff00ff;
    }

    .game-over-content h1 {
      font-size: 80px;
      margin-bottom: 30px;
      letter-spacing: 5px;
    }

    .game-over-content p {
      font-size: 32px;
      margin-bottom: 20px;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
    }

    .game-over-content button {
      margin-top: 40px;
      padding: 20px 40px;
      font-size: 24px;
      background: #ff00ff;
      color: #000;
      border: 3px solid #00ffff;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow: 0 0 20px #ff00ff;
    }

    .game-over-content button:hover {
      background: #00ffff;
      color: #ff00ff;
      box-shadow: 0 0 30px #00ffff;
      transform: scale(1.05);
    }

    #speedometer {
      position: absolute;
      bottom: 30px;
      left: 30px;
      color: #00ffff;
      font-size: 16px;
      text-shadow: 0 0 10px #00ffff;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }

    #instructions {
      position: absolute;
      bottom: 30px;
      right: 30px;
      color: #00ffff;
      font-size: 14px;
      text-shadow: 0 0 10px #00ffff;
      text-align: right;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="hud">
      <div class="hud-item">DISTANCE: <span id="distance">0</span>M</div>
      <div class="hud-item">SPEED: <span id="speed">0</span>KM/H</div>
      <div class="hud-item">STATUS: <span id="status">GO</span></div>
    </div>
    <div id="speedometer">
      <canvas id="speedometerCanvas" width="120" height="120"></canvas>
    </div>
    <div id="instructions">
      &larr; &rarr; STEER<br/>
      AVOID OBSTACLES
    </div>
    <div id="gameOverScreen">
      <div class="game-over-content">
        <h1>GAME OVER</h1>
        <p>FINAL SCORE: <span id="finalScore">0</span>M</p>
        <button onclick="location.reload()">RESTART GAME</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============== SCENE SETUP ==============
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.querySelector('canvas') || undefined });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a0a);
    document.getElementById('gameContainer').appendChild(renderer.domElement);

    // ============== LIGHTING ==============
    // Gradient sky
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 512);
    gradient.addColorStop(0, '#2d1b69');
    gradient.addColorStop(0.5, '#9b59b6');
    gradient.addColorStop(1, '#ff6b35');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 512, 512);
    const skyTexture = new THREE.CanvasTexture(canvas);
    const skyMaterial = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
    const skyGeometry = new THREE.SphereGeometry(1000, 32, 32);
    const skyMesh = new THREE.Mesh(skyGeometry, skyMaterial);
    scene.add(skyMesh);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x9b59b6, 0.8);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xff00ff, 0.6);
    directionalLight.position.set(100, 100, 50);
    scene.add(directionalLight);

    // ============== ROAD ==============
    const roadSegments = [];
    const roadWidth = 15;
    let roadZPos = 0;

    function createRoadSegment(zPos) {
      const group = new THREE.Group();

      // Road surface
      const roadGeometry = new THREE.PlaneGeometry(roadWidth, 50);
      const roadMaterial = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        metalness: 0.3,
        roughness: 0.7
      });
      const road = new THREE.Mesh(roadGeometry, roadMaterial);
      road.position.z = zPos;
      group.add(road);

      // Left edge glow
      const leftEdgeGeometry = new THREE.PlaneGeometry(0.5, 50);
      const glowMaterial = new THREE.MeshBasicMaterial({ color: 0x00bcd4 });
      const leftEdge = new THREE.Mesh(leftEdgeGeometry, glowMaterial);
      leftEdge.position.set(-roadWidth / 2 - 0.25, 0.01, zPos);
      group.add(leftEdge);

      // Right edge glow
      const rightEdge = new THREE.Mesh(leftEdgeGeometry, glowMaterial);
      rightEdge.position.set(roadWidth / 2 + 0.25, 0.01, zPos);
      group.add(rightEdge);

      // Grid lines
      for (let i = 0; i < 50; i += 5) {
        const lineGeometry = new THREE.PlaneGeometry(roadWidth, 0.2);
        const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xe91e63 });
        const line = new THREE.Mesh(lineGeometry, lineMaterial);
        line.position.set(0, 0.02, zPos - i);
        group.add(line);
      }

      scene.add(group);
      return group;
    }

    // Pre-generate road segments
    for (let i = 0; i < 100; i++) {
      roadSegments.push(createRoadSegment(-i * 50));
    }

    // ============== PLAYER CAR ==============
    const carGroup = new THREE.Group();
    carGroup.position.set(0, 0.5, 0);

    // Car body
    const bodyGeometry = new THREE.BoxGeometry(2, 1, 4);
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0xff00ff,
      metalness: 0.8,
      roughness: 0.2
    });
    const carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
    carBody.position.z = 2;
    carGroup.add(carBody);

    // Cockpit
    const cockpitGeometry = new THREE.BoxGeometry(1.5, 0.6, 1.5);
    const cockpitMaterial = new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      metalness: 0.9,
      roughness: 0.1
    });
    const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
    cockpit.position.set(0, 0.8, 1.5);
    carGroup.add(cockpit);

    // Wheels
    const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
    const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const wheels = [];
    const wheelPositions = [
      [-1, 0, 1],
      [1, 0, 1],
      [-1, 0, -1],
      [1, 0, -1]
    ];
    wheelPositions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(pos[0], pos[1], pos[2]);
      wheels.push(wheel);
      carGroup.add(wheel);
    });

    scene.add(carGroup);

    // ============== OBSTACLES ==============
    const obstacles = [];
    const maxObstacles = 10;

    function createObstacle(zPos) {
      const obstacleGroup = new THREE.Group();
      const sideChance = Math.random();
      const xPos = sideChance < 0.33 ? -4 : sideChance < 0.66 ? 4 : 0;

      // Obstacle box
      const obstacleGeometry = new THREE.BoxGeometry(2.5, 2, 2.5);
      const obstacleMaterial = new THREE.MeshStandardMaterial({
        color: 0x9b59b6,
        metalness: 0.6,
        roughness: 0.3
      });
      const obstacleBox = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
      obstacleGroup.add(obstacleBox);

      // Glowing outline
      const outlineGeometry = new THREE.BoxGeometry(2.7, 2.2, 2.7);
      const outlineMaterial = new THREE.MeshBasicMaterial({
        color: 0xe91e63,
        wireframe: true
      });
      const outline = new THREE.Mesh(outlineGeometry, outlineMaterial);
      outline.position.z = 0.01;
      obstacleGroup.add(outline);

      obstacleGroup.position.set(xPos, 1, zPos);
      scene.add(obstacleGroup);

      return {
        mesh: obstacleGroup,
        x: xPos,
        z: zPos,
        width: 2.5,
        depth: 2.5
      };
    }

    // ============== GAME STATE ==============
    let gameState = {
      running: true,
      distance: 0,
      speed: 0,
      maxSpeed: 0,
      carX: 0,
      cameraZ: 0,
      collision: false
    };

    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // ============== COLLISION DETECTION ==============
    function checkCollision() {
      const carRadius = 1.5;
      obstacles.forEach(obstacle => {
        const dx = gameState.carX - obstacle.x;
        const dz = 0; // Car is always at center Z
        if (Math.abs(dx) < (carRadius + obstacle.width / 2) &&
            Math.abs(gameState.cameraZ - obstacle.z) < (carRadius + obstacle.depth / 2)) {
          return true;
        }
      });
      return false;
    }

    // ============== SPEEDOMETER ==============
    function drawSpeedometer(speed, maxSpeed) {
      const canvas = document.getElementById('speedometerCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);

      // Background circle
      ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, w / 2 - 5, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(w / 2, h / 2, w / 2 - 5, 0, Math.PI * 2);
      ctx.stroke();

      // Needle
      const angle = (speed / maxSpeed) * Math.PI - Math.PI / 2;
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(w / 2, h / 2);
      ctx.lineTo(w / 2 + Math.cos(angle) * (w / 2 - 20), h / 2 + Math.sin(angle) * (h / 2 - 20));
      ctx.stroke();

      // Speed text
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(Math.round(speed), w / 2, h / 2 + 5);
    }

    // ============== ANIMATION LOOP ==============
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      if (!gameState.running) {
        renderer.render(scene, camera);
        return;
      }

      const deltaTime = Math.min(clock.getDelta(), 0.016);

      // Update car position
      if (keys['ArrowLeft'] || keys['a']) {
        gameState.carX = Math.max(-roadWidth / 2 + 1.2, gameState.carX - 5 * deltaTime);
      }
      if (keys['ArrowRight'] || keys['d']) {
        gameState.carX = Math.min(roadWidth / 2 - 1.2, gameState.carX + 5 * deltaTime);
      }

      // Increase speed over time
      gameState.maxSpeed = 100 + gameState.distance / 100;
      gameState.speed = Math.min(gameState.speed + 50 * deltaTime, gameState.maxSpeed);

      // Update distance
      gameState.distance += gameState.speed * deltaTime;

      // Update camera
      gameState.cameraZ -= gameState.speed * deltaTime;
      camera.position.set(gameState.carX * 0.3, 5, gameState.cameraZ + 20);
      camera.lookAt(gameState.carX, 0, gameState.cameraZ - 50);

      // Update car
      carGroup.position.x = gameState.carX;
      carGroup.position.z = gameState.cameraZ;

      // Update sky
      skyMesh.position.copy(camera.position);

      // Spawn obstacles
      if (obstacles.length < maxObstacles && Math.random() < 0.02) {
        obstacles.push(createObstacle(gameState.cameraZ - 200));
      }

      // Remove far obstacles and check collision
      obstacles.forEach((obstacle, index) => {
        if (gameState.cameraZ - obstacle.z > 100) {
          scene.remove(obstacle.mesh);
          obstacles.splice(index, 1);
        } else if (checkCollision()) {
          gameState.running = false;
          showGameOver(Math.round(gameState.distance));
        }
      });

      // Update HUD
      document.getElementById('distance').textContent = Math.round(gameState.distance);
      document.getElementById('speed').textContent = Math.round(gameState.speed);
      document.getElementById('status').textContent = gameState.running ? 'GO' : 'CRASH';

      // Draw speedometer
      drawSpeedometer(gameState.speed, gameState.maxSpeed);

      renderer.render(scene, camera);
    }

    function showGameOver(score) {
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
